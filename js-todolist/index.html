<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>To Do List</title>
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <link rel="stylesheet" href="style.css">

  </head>
  <body>
   <div id="todolist">
    <div class="title" >
      <h1>To Do List</h1>
    </div>
    <div class="input__section">
     <form>
       <div>
         <input type = "text" class="itemadd" autofocus="true">
       </div>
       <div>
         <button type="button" class="input_button" ><i class="fas fa-plus-square"></i></button>
       </div>
     </form>
    </div>
    <div class="item__list">

    </div>
   </div>

  </body>
 <script src="todo.js" defer></script>
</html>
